<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb" id="themeColor">
  <meta name="description" content="Controle semanal minimalista de medicamentos com interruptores 3D.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Meus Remédios</title>
  <style>
    :root{
      color-scheme:light;
      --bg:#eef1f6;--panel:#f7f9fc;--card:#f4f6fa;--text:#18202b;
      --muted:#758092;--line:rgba(30,45,65,.10);--blue:#2d68c4;
      --green:#24a66d;--red:#d55353;--shadow:#cfd5df;--shine:#fff;
      --topbar:rgba(238,241,246,.82);
    }
    html[data-theme="dark"]{
      color-scheme:dark;
      --bg:#11161d;--panel:#171d26;--card:#1b222c;--text:#ecf2f9;
      --muted:#9aa7b8;--line:rgba(255,255,255,.08);--blue:#73a8ff;
      --green:#4bd394;--red:#ff7878;--shadow:#0a0d12;--shine:#2c3542;
      --topbar:rgba(17,22,29,.82);
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;background:
      radial-gradient(circle at 20% 0%,rgba(255,255,255,.65),transparent 35%),
      var(--bg);color:var(--text);font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      transition:background .25s,color .25s;
    }
    html[data-theme="dark"] body{background:radial-gradient(circle at 20% 0%,rgba(80,110,150,.12),transparent 35%),var(--bg)}
    button,input{font:inherit}
    .topbar{
      position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
      padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:var(--topbar);
      backdrop-filter:blur(16px);border-bottom:1px solid var(--line)
    }
    .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.02em}
    .brand-mark{
      width:38px;height:38px;border-radius:13px;display:grid;place-items:center;
      background:linear-gradient(145deg,#fff,#d8dde6);box-shadow:7px 7px 14px var(--shadow),-6px -6px 12px var(--shine);
      color:var(--blue)
    }
    html[data-theme="dark"] .brand-mark{background:linear-gradient(145deg,#222b36,#121820)}
    .actions{display:flex;gap:8px}
    .icon-btn,.add-btn,.ghost-btn{
      border:0;color:var(--text);cursor:pointer;transition:.18s transform,.18s opacity;
    }
    .icon-btn:active,.add-btn:active,.ghost-btn:active{transform:scale(.96)}
    .icon-btn{
      width:42px;height:42px;border-radius:14px;background:var(--panel);
      box-shadow:5px 5px 11px var(--shadow),-5px -5px 10px var(--shine);
      display:grid;place-items:center;font-size:20px
    }
    main{width:min(760px,100%);margin:auto;padding:22px 16px 110px}
    .hero{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:6px 2px 22px}
    h1{font-size:clamp(26px,7vw,40px);margin:0;letter-spacing:-.045em}
    .subtitle{margin:5px 0 0;color:var(--muted);font-size:14px}
    .week-chip{white-space:nowrap;color:var(--muted);font-size:12px;padding:8px 10px;border:1px solid var(--line);border-radius:99px}
    .list{display:grid;gap:16px}
    .medicine-card{
      position:relative;padding:18px;border-radius:24px;background:linear-gradient(145deg,var(--panel),var(--card));
      box-shadow:11px 11px 24px var(--shadow),-9px -9px 22px var(--shine);overflow:hidden
    }
    .medicine-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .medicine-title{font-size:20px;font-weight:800;letter-spacing:-.025em}
    .medicine-meta{color:var(--muted);font-size:13px;margin-top:3px}
    .more{border:0;background:transparent;color:var(--muted);font-size:22px;cursor:pointer;padding:0 2px}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:18px}
    .day{text-align:center}
    .day-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700}
    .switch{
      appearance:none;width:100%;max-width:62px;aspect-ratio:1.55;border:0;border-radius:12px;cursor:pointer;position:relative;
      background:linear-gradient(180deg,#d5dae2,#f7f9fc);box-shadow:inset 3px 3px 6px rgba(50,60,75,.22),inset -3px -3px 7px rgba(255,255,255,.9);
      transition:.22s ease;outline:none
    }
    html[data-theme="dark"] .switch{background:linear-gradient(180deg,#0f141b,#242d38);box-shadow:inset 3px 3px 7px #080b0f,inset -2px -2px 6px #303b49}
    .switch::before{
      content:"";position:absolute;top:4px;bottom:4px;left:4px;width:calc(55% - 4px);border-radius:9px;
      background:linear-gradient(145deg,#fff,#d7dce4);box-shadow:3px 4px 7px rgba(20,30,40,.28),inset 1px 1px 1px #fff;
      transition:.22s cubic-bezier(.2,.8,.2,1)
    }
    html[data-theme="dark"] .switch::before{background:linear-gradient(145deg,#333e4c,#171e27);box-shadow:3px 4px 7px #080b0f,inset 1px 1px 1px #465364}
    .switch::after{
      content:"";position:absolute;right:8px;top:50%;translate:0 -50%;width:10px;height:16px;border-radius:3px;
      background:var(--red);box-shadow:inset 0 0 3px rgba(0,0,0,.4),0 0 0 1px rgba(0,0,0,.1)
    }
    .switch:checked::before{left:calc(45% + 1px)}
    .switch:checked::after{left:8px;right:auto;background:var(--green);box-shadow:0 0 12px color-mix(in srgb,var(--green) 60%,transparent),inset 0 0 3px rgba(0,0,0,.3)}
    .switch.today{outline:2px solid color-mix(in srgb,var(--blue) 60%,transparent);outline-offset:3px}
    .empty{
      text-align:center;padding:42px 20px;border:1px dashed var(--line);border-radius:24px;color:var(--muted)
    }
    .add-btn{
      position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:20;
      display:flex;align-items:center;gap:9px;padding:15px 18px;border-radius:18px;
      color:white;background:linear-gradient(145deg,#3979d6,#215bad);box-shadow:0 12px 28px rgba(25,74,145,.35);font-weight:800
    }
    dialog{border:0;border-radius:24px;padding:0;background:var(--panel);color:var(--text);width:min(92vw,440px);box-shadow:0 24px 80px rgba(0,0,0,.35)}
    dialog::backdrop{background:rgba(10,14,20,.48);backdrop-filter:blur(5px)}
    .dialog-body{padding:24px}
    .dialog-body h2{margin:0 0 18px}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:14px 0 6px}
    input[type="text"],input[type="time"]{
      width:100%;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:14px;padding:13px 14px;outline:none
    }
    .dialog-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
    .ghost-btn{padding:11px 14px;border-radius:12px;background:transparent}
    .primary{background:var(--blue);color:white}
    .menu{position:absolute;right:14px;top:52px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:0 14px 35px rgba(0,0,0,.2);display:none;z-index:5}
    .menu.open{display:block}
    .menu button{display:block;width:100%;border:0;background:transparent;color:var(--text);padding:10px 14px;text-align:left;border-radius:9px;cursor:pointer}
    .menu button:hover{background:var(--bg)}
    .menu .danger{color:var(--red)}
    .install{display:none}
    @media (max-width:480px){
      .days{gap:5px}.medicine-card{padding:16px}.day-label{font-size:10px}.switch{border-radius:10px}.add-btn span{display:none}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="brand-mark">✚</div><span>Meus Remédios</span></div>
    <div class="actions">
      <button id="installBtn" class="icon-btn install" aria-label="Instalar aplicativo" title="Instalar">⇩</button>
      <button id="themeBtn" class="icon-btn" aria-label="Alternar dia e noite" title="Dia/noite">☾</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div>
        <h1>Controle semanal</h1>
        <p class="subtitle">Toque no interruptor depois de tomar.</p>
      </div>
      <div class="week-chip" id="weekChip"></div>
    </section>
    <section class="list" id="list"></section>
  </main>

  <button class="add-btn" id="addBtn">＋ <span>Novo remédio</span></button>

  <dialog id="medicineDialog">
    <form method="dialog" id="medicineForm" class="dialog-body">
      <h2 id="dialogTitle">Novo remédio</h2>
      <input type="hidden" id="editId">
      <label for="name">Nome</label>
      <input id="name" type="text" maxlength="50" placeholder="Ex.: Losartana" required>
      <label for="dose">Dose / observação</label>
      <input id="dose" type="text" maxlength="60" placeholder="Ex.: 50 mg após o café">
      <label for="time">Horário</label>
      <input id="time" type="time">
      <div class="dialog-actions">
        <button class="ghost-btn" type="button" onclick="this.closest('dialog').close()">Cancelar</button>
        <button class="ghost-btn primary" id="saveBtn" value="default">Salvar</button>
      </div>
    </form>
  </dialog>

<script>
(() => {
  const STORE = 'med-control-v1';
  const THEME = 'med-theme';
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const list = document.querySelector('#list');
  const dialog = document.querySelector('#medicineDialog');
  const form = document.querySelector('#medicineForm');
  const themeBtn = document.querySelector('#themeBtn');
  let meds = load();

  function weekKey(date = new Date()){
    const d = new Date(date); d.setHours(0,0,0,0);
    const day = d.getDay(); d.setDate(d.getDate() - day);
    return d.toISOString().slice(0,10);
  }
  function load(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORE));
      if(saved?.meds) return saved.meds;
    }catch{}
    return [
      {id:crypto.randomUUID(),name:'Vitamina D',dose:'1 cápsula',time:'08:00',checks:{}},
      {id:crypto.randomUUID(),name:'Pressão',dose:'50 mg',time:'20:00',checks:{}}
    ];
  }
  function persist(){ localStorage.setItem(STORE, JSON.stringify({meds})); }
  function esc(s=''){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function render(){
    const wk = weekKey();
    const today = new Date().getDay();
    document.querySelector('#weekChip').textContent = 'Semana de ' + new Date(wk+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    if(!meds.length){
      list.innerHTML = '<div class="empty">Nenhum remédio cadastrado.<br>Use o botão “Novo remédio”.</div>';
      return;
    }
    list.innerHTML = meds.map(m => {
      const state = m.checks?.[wk] || {};
      return `<article class="medicine-card">
        <div class="medicine-head">
          <div>
            <div class="medicine-title">${esc(m.name)}</div>
            <div class="medicine-meta">${[m.dose, m.time && 'às '+m.time].filter(Boolean).map(esc).join(' • ') || 'Sem detalhes'}</div>
          </div>
          <button class="more" aria-label="Opções" data-menu="${m.id}">⋮</button>
        </div>
        <div class="menu" id="menu-${m.id}">
          <button data-edit="${m.id}">Editar</button>
          <button class="danger" data-delete="${m.id}">Excluir</button>
        </div>
        <div class="days">
          ${DAYS.map((d,i)=>`<div class="day">
            <div class="day-label">${d}</div>
            <input class="switch ${i===today?'today':''}" type="checkbox" aria-label="${d}: tomado" data-id="${m.id}" data-day="${i}" ${state[i]?'checked':''}>
          </div>`).join('')}
        </div>
      </article>`;
    }).join('');
  }

  list.addEventListener('change', e => {
    if(!e.target.matches('.switch')) return;
    const med = meds.find(m => m.id === e.target.dataset.id);
    const wk = weekKey();
    med.checks ||= {}; med.checks[wk] ||= {};
    med.checks[wk][e.target.dataset.day] = e.target.checked;
    persist();
  });

  list.addEventListener('click', e => {
    const menuId = e.target.dataset.menu;
    if(menuId){
      document.querySelectorAll('.menu').forEach(x => x.classList.remove('open'));
      document.querySelector('#menu-'+menuId).classList.toggle('open');
      return;
    }
    const editId = e.target.dataset.edit;
    if(editId){
      const m = meds.find(x=>x.id===editId);
      document.querySelector('#editId').value=m.id;
      document.querySelector('#name').value=m.name;
      document.querySelector('#dose').value=m.dose||'';
      document.querySelector('#time').value=m.time||'';
      document.querySelector('#dialogTitle').textContent='Editar remédio';
      dialog.showModal();
    }
    const deleteId = e.target.dataset.delete;
    if(deleteId && confirm('Excluir este remédio?')){
      meds = meds.filter(x=>x.id!==deleteId); persist(); render();
    }
  });
  document.addEventListener('click', e => {
    if(!e.target.closest('.more') && !e.target.closest('.menu')) document.querySelectorAll('.menu').forEach(x=>x.classList.remove('open'));
  });

  document.querySelector('#addBtn').onclick = () => {
    form.reset(); document.querySelector('#editId').value='';
    document.querySelector('#dialogTitle').textContent='Novo remédio';
    dialog.showModal();
  };
  form.addEventListener('submit', e => {
    if(e.submitter?.value === 'cancel') return;
    e.preventDefault();
    const name = document.querySelector('#name').value.trim();
    if(!name) return;
    const id = document.querySelector('#editId').value;
    const data = {name,dose:document.querySelector('#dose').value.trim(),time:document.querySelector('#time').value};
    if(id) Object.assign(meds.find(x=>x.id===id),data);
    else meds.push({id:crypto.randomUUID(),...data,checks:{}});
    persist(); dialog.close(); render();
  });

  function setTheme(theme){
    document.documentElement.dataset.theme = theme;
    localStorage.setItem(THEME,theme);
    themeBtn.textContent = theme==='dark'?'☀':'☾';
    document.querySelector('#themeColor').content = theme==='dark'?'#11161d':'#eef1f6';
  }
  setTheme(localStorage.getItem(THEME) || (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
  themeBtn.onclick = () => setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');

  let installPrompt;
  addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); installPrompt=e;
    document.querySelector('#installBtn').style.display='grid';
  });
  document.querySelector('#installBtn').onclick = async () => {
    if(!installPrompt) return;
    installPrompt.prompt(); await installPrompt.userChoice; installPrompt=null;
    document.querySelector('#installBtn').style.display='none';
  };

  if('serviceWorker' in navigator) addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
  render();

  // Função global para o APK de alarmes ler os dados
  window.getMedsData = function() {
    try {
      var data = localStorage.getItem('med-control-v1');
      return data || 'null';
    } catch(e) {
      return 'null';
    }
  };

  // Botão de exportar (visível apenas quando o APK solicitar)
  window.exportMedsData = function() {
    try {
      var data = localStorage.getItem('med-control-v1');
      if (data && data !== 'null') {
        // Tenta usar a Web Share API
        if (navigator.share) {
          navigator.share({ title: 'Remédios', text: data });
        }
        return data;
      }
      return null;
    } catch(e) {
      return null;
    }
  };

  // Se estiver sendo executado dentro do APK (AndroidBridge presente), avisa
  if (typeof AndroidBridge !== 'undefined') {
    setTimeout(function() {
      var data = window.getMedsData();
      if (data && data !== 'null') {
        AndroidBridge.onData(data);
      } else {
        AndroidBridge.onError('Nenhum remedio cadastrado');
      }
    }, 500);
  }
})();
</script>
</body>
</html>
